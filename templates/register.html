<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SevAI - Register</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
</head>
<body class="auth-page">

    <nav class="navbar">
        <div class="nav-brand">
            <a href="/" style="text-decoration:none; display:flex; align-items:center; gap:10px;">
                <span class="logo">🤝</span>
                <span class="brand-name">SevAI</span>
            </a>
        </div>
        <div class="nav-links">
            <a href="/login">Already have an account? Login</a>
        </div>
    </nav>

    <div class="auth-container">
        <div class="auth-card" style="max-width: 550px;">

            <div class="auth-header">
                <h1>Join SevAI! 🌟</h1>
                <p>Create your account and start making an impact</p>
            </div>

            <div class="alert alert-error" id="errorMsg" style="display:none;"></div>
            <div class="alert alert-success" id="successMsg" style="display:none;"></div>

            <!-- ROLE SELECTION -->
            <div class="role-selector">
                <div class="role-card active" id="volunteerRole" onclick="selectRole('volunteer')">
                    <i class="fas fa-hands-helping"></i>
                    <h3>Volunteer</h3>
                    <p>I want to help</p>
                </div>
                <div class="role-card" id="ngoRole" onclick="selectRole('ngo')">
                    <i class="fas fa-building"></i>
                    <h3>NGO</h3>
                    <p>We need volunteers</p>
                </div>
            </div>

            <form id="registerForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" id="name" placeholder="Enter your full name" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="email" placeholder="Enter your email" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="Create a password" required>
                        <i class="fas fa-eye toggle-password" onclick="togglePassword()"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label>Location</label>
                    <div class="input-wrapper">
                        <i class="fas fa-map-marker-alt"></i>
                        <input type="text" id="location" placeholder="Your city (e.g. Mumbai, Pune)" required>
                    </div>
                </div>

                <!-- Volunteer Fields -->
                <div id="volunteerFields">
                    <div class="form-group">
                        <label>Your Skills</label>
                        <div class="input-wrapper">
                            <i class="fas fa-star"></i>
                            <input type="text" id="skills" placeholder="e.g. Teaching, Cooking, Medical">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>Availability</label>
                        <div class="input-wrapper">
                            <i class="fas fa-calendar"></i>
                            <input type="text" id="availability" placeholder="e.g. Weekends, Evenings">
                        </div>
                    </div>
                </div>

                <!-- NGO Fields -->
                <div id="ngoFields" style="display:none;">
                    <div class="form-group">
                        <label>NGO Name</label>
                        <div class="input-wrapper">
                            <i class="fas fa-building"></i>
                            <input type="text" id="ngoName" placeholder="Your organization name">
                        </div>
                    </div>

                    <div class="form-group">
                        <label>NGO Description</label>
                        <div class="input-wrapper">
                            <i class="fas fa-info-circle"></i>
                            <input type="text" id="ngoDesc" placeholder="What does your NGO do?">
                        </div>
                    </div>
                </div>

                <button type="submit" class="btn-primary btn-full" id="registerBtn">
                    <span>Create Account</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <p class="auth-footer">
                Already have an account? <a href="/login">Login here</a>
            </p>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/firebase-config.js') }}"></script>
    <script src="{{ url_for('static', filename='js/register.js') }}"></script>
</body>
</html>
