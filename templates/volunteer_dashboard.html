<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SevAI - Volunteer Dashboard</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
</head>
<body class="dashboard-page">

    <!-- NAVBAR -->
    <nav class="navbar dashboard-nav">
        <div class="nav-brand">
            <span class="logo">🤝</span>
            <span class="brand-name">SevAI</span>
        </div>
        <div class="nav-center">
            <span>Volunteer Dashboard</span>
        </div>
        <div class="nav-links">
            <span id="userName">Loading...</span>
            <button class="btn-logout" onclick="logout()">
                <i class="fas fa-sign-out-alt"></i> Logout
            </button>
        </div>
    </nav>

    <!-- DASHBOARD CONTENT -->
    <div class="dashboard-container">

        <!-- SIDEBAR -->
        <div class="sidebar">
            <div class="sidebar-profile">
                <div class="profile-avatar" id="profileAvatar">U</div>
                <h3 id="sidebarName">Loading...</h3>
                <p id="sidebarLocation">📍 Location</p>
            </div>

            <ul class="sidebar-menu">
                <!-- All Needs -->
                <li onclick="showSection('needs', this)" class="active">
                    <i class="fas fa-list"></i> All Needs
                </li>

                <!-- My Profile -->
                <li onclick="showSection('profile', this)">
                    <i class="fas fa-user"></i> My Profile
                </li>
            </ul>
        </div>

        <!-- MAIN CONTENT -->
        <div class="main-content">
            <div id="needsContent">
                <div class="welcome-box">
                    <img src="/static/images/volunteer.jpg" class="welcome-img">

                    <h2>🤝 Ready to Make a Difference?</h2>

                    <p>
                        Your small effort can change someone's life ❤️  
                        Click "All Needs" from sidebar to start helping.
                    </p>
                </div>
            </div>

            <!-- ALL NEEDS SECTION -->
            <div id="needsSection" class="section">
                
            </div>

            <!-- PROFILE SECTION -->
            <div id="profileSection" class="section">
                <div class="section-header">
                    <h2>👤 My Profile</h2>
                </div>
                <div class="profile-card">
                    <div class="profile-info">
                        <div class="info-group">
                            <label>Full Name</label>
                            <p id="profileName">-</p>
                        </div>
                        <div class="info-group">
                            <label>Email</label>
                            <p id="profileEmail">-</p>
                        </div>
                        <div class="info-group">
                            <label>Location</label>
                            <p id="profileLocation">-</p>
                        </div>
                        <div class="info-group">
                            <label>Skills</label>
                            <p id="profileSkills">-</p>
                        </div>
                        <div class="info-group">
                            <label>Availability</label>
                            <p id="profileAvailability">-</p>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script src="{{ url_for('static', filename='js/firebase-config.js') }}"></script>
    <script src="{{ url_for('static', filename='js/volunteer.js') }}"></script>
</body>
</html>
